<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SENTINEL — Live Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#090b0f;--surface:#0e1117;--border:#1c2230;--accent:#00e5ff;--red:#ff3b3b;--green:#00ff88;--text:#c8d6e5;--muted:#4a5568;--mono:'Share Tech Mono',monospace;--sans:'Barlow Condensed',sans-serif}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:9999}
    header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
    .logo{font-weight:700;font-size:20px;letter-spacing:6px;color:var(--accent)}
    .logo span{color:var(--text);font-weight:300}
    .hdr-right{display:flex;align-items:center;gap:20px}
    .live-badge{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:2px}
    .live-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.4s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    #clock{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:1px}
    .toolbar{display:flex;align-items:center;gap:8px;padding:8px 24px;border-bottom:1px solid var(--border);background:rgba(14,17,23,.95);flex-wrap:wrap}
    .tlabel{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
    .btn{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:all .15s}
    .btn:hover{border-color:var(--accent);color:var(--accent)}
    .btn.primary{border-color:var(--accent);color:var(--accent)}
    .btn.primary:hover{background:var(--accent);color:var(--bg)}
    .btn.danger{border-color:var(--red);color:var(--red)}
    .btn.danger:hover{background:var(--red);color:#fff}
    .btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
    .spacer{margin-left:auto}
    .qtoggle,.ltoggle{display:flex}
    .qtoggle .btn,.ltoggle .btn{padding:6px 11px}
    .qtoggle .btn:first-child,.ltoggle .btn:first-child{border-right:none}
    main{padding:16px 24px}
    .grid{display:grid;gap:14px}
    .grid.l1{grid-template-columns:1fr}
    .grid.l2{grid-template-columns:repeat(2,1fr)}
    .grid.l3{grid-template-columns:repeat(2,1fr)}
    .grid.l3 .cam-card:first-child{grid-column:1/-1}
    .grid.l4,.grid.l5{grid-template-columns:repeat(2,1fr)}
    @media(max-width:700px){.grid{grid-template-columns:1fr!important}}
    .cam-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;position:relative;transition:border-color .2s}
    .cam-card:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 30px rgba(0,229,255,.05)}
    .cam-card::before,.cam-card::after{content:'';position:absolute;width:16px;height:16px;z-index:10;pointer-events:none}
    .cam-card::before{top:9px;left:9px;border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
    .cam-card::after{bottom:43px;right:9px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent)}
    .vwrap{position:relative;aspect-ratio:16/9;background:#000}
    video{width:100%;height:100%;object-fit:cover;display:block}
    .hud{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:12px 14px;pointer-events:none;z-index:5}
    .hud-top{display:flex;justify-content:space-between;align-items:flex-start}
    .hud-bot{display:flex;justify-content:space-between;align-items:flex-end}
    .tag{font-family:var(--mono);font-size:9px;letter-spacing:1px;background:rgba(0,0,0,.65);padding:3px 7px}
    .tag.id{color:var(--accent)}.tag.live{color:var(--green)}.tag.loading{color:#fa0}.tag.error{color:var(--red)}.tag.idle{color:var(--muted)}
    .cam-name{font-size:14px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.55);padding:3px 9px}
    .cam-ts{font-family:var(--mono);font-size:9px;color:var(--muted);background:rgba(0,0,0,.55);padding:3px 7px}
    .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#07090d;z-index:4}
    .ph svg{opacity:.18}
    .ph p{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;text-align:center;line-height:1.9}
    .ph-btn{pointer-events:all;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:7px 20px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;transition:all .15s}
    .ph-btn:hover{background:var(--accent);color:var(--bg)}
    .spin{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);z-index:6}
    .spin.on{display:flex}
    .ring{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .card-foot{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-top:1px solid var(--border);background:rgba(0,0,0,.3)}
    .devid{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}
    .card-acts{display:flex;align-items:center;gap:7px}
    .ibtn{font-family:var(--mono);font-size:9px;letter-spacing:2px;padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;text-transform:uppercase}
    .ibtn:hover{border-color:var(--accent);color:var(--accent)}
    .ibtn.red:hover{border-color:var(--red);color:var(--red)}
    .latency{font-family:var(--mono);font-size:9px;min-width:50px;text-align:right}
    .latency.good{color:var(--green)}.latency.warn{color:#fa0}.latency.bad{color:var(--red)}
    footer{border-top:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}
    #toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:9px 16px;transform:translateY(60px);opacity:0;transition:all .3s;z-index:99999}
    #toast.show{transform:translateY(0);opacity:1}
    #toast.err{border-color:var(--red);color:var(--red)}
  </style>
</head>
<body>
<header>
  <div class="logo">SENTINEL <span>// LIVE MONITOR</span></div>
  <div class="hdr-right">
    <div class="live-badge"><div class="dot"></div>SYSTEM ONLINE</div>
    <div id="clock">--:--:--</div>
  </div>
</header>
<div class="toolbar">
  <span class="tlabel">Cameras</span>
  <button class="btn primary" onclick="connectAll()">▶ ALL</button>
  <button class="btn danger"  onclick="stopAll()">■ STOP ALL</button>
  <div class="spacer"></div>
  <span class="tlabel">Layout</span>
  <div class="ltoggle">
    <button class="btn active" id="l-grid" onclick="setLayout('grid')">⊞</button>
    <button class="btn"        id="l-solo" onclick="setLayout('solo')">□</button>
  </div>
  <span class="tlabel">Quality</span>
  <div class="qtoggle">
    <button class="btn active" id="q-hd" onclick="setQuality('HD')">HD</button>
    <button class="btn"        id="q-sd" onclick="setQuality('SD')">SD</button>
  </div>
</div>
<main><div class="grid l2" id="grid"></div></main>
<footer>
  <span id="fmsg">INITIALISING...</span>
  <span>SENTINEL v5.1 // go2rtc+MSE // IMOU</span>
</footer>
<div id="toast"></div>

<script>
let cameras = [], currentQuality = 'HD', currentLayout = 'grid';
const S = {}; // per-cam state: { ms, sb, ws, queue, flushing, frameCount, latTimer }

setInterval(() => {
  const t = new Date().toLocaleTimeString('en-GB', { hour12: false });
  document.getElementById('clock').textContent = t;
  document.querySelectorAll('.cam-ts').forEach(e => e.textContent = t);
}, 1000);

async function init() {
  try {
    const r = await fetch('/api/cameras');
    cameras = (await r.json()).cameras;
    buildGrid();
    setFooter(`${cameras.length} CAMERA(S) CONFIGURED`);
    cameras.forEach(async cam => {
      try {
        const r = await fetch(`/api/device/${cam.id}/online`);
        const d = await r.json();
        setStatus(cam.id, d.online ? 'idle' : 'error', d.online ? 'READY' : 'OFFLINE');
      } catch (_) {}
    });
  } catch (e) { setFooter('INIT FAILED — ' + e.message); }
}

function buildGrid() {
  const n    = cameras.length;
  const grid = document.getElementById('grid');
  grid.className = `grid l${Math.min(n, 5)}`;
  grid.innerHTML = cameras.map(cardHTML).join('');
}

function cardHTML({ id, label }) {
  return `<div class="cam-card" id="card-${id}">
    <div class="vwrap">
      <video id="vid-${id}" muted playsinline></video>
      <div class="ph" id="ph-${id}">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1"><path d="M15 10l4.553-2.277A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
        <p>${label}<br><span style="font-size:8px;opacity:.5">${id}</span></p>
        <button class="ph-btn" onclick="connectCam('${id}')">▶ CONNECT</button>
      </div>
      <div class="spin" id="spin-${id}"><div class="ring"></div></div>
      <div class="hud">
        <div class="hud-top"><div class="tag id">${label}</div><div class="tag idle" id="st-${id}">NO SIGNAL</div></div>
        <div class="hud-bot"><div class="cam-name">${label}</div><div class="cam-ts">--:--:--</div></div>
      </div>
    </div>
    <div class="card-foot">
      <div class="devid">${id}</div>
      <div class="card-acts">
        <span class="latency good" id="lat-${id}">--ms</span>
        <button class="ibtn" onclick="fullscreen('${id}')">FULL</button>
        <button class="ibtn red" onclick="stopCam('${id}')">STOP</button>
      </div>
    </div>
  </div>`;
}

function connectAll() { cameras.forEach(c => connectCam(c.id)); }
function stopAll()    { cameras.forEach(c => stopCam(c.id)); }

async function connectCam(id) {
  setStatus(id, 'loading', 'CONNECTING...'); spinner(id, true); hidePH(id);
  try {
    const r = await fetch(`/api/stream/${id}?quality=${currentQuality}`);
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'Failed');
    openMSE(id, j.wsUrl);
  } catch (e) {
    spinner(id, false); showPH(id);
    setStatus(id, 'error', '✕ ERROR');
    toast(`${id}: ${e.message}`, true);
  }
}

// ── go2rtc MSE via WebSocket ──────────────────────────────────────────────────
// go2rtc sends fMP4 over WebSocket natively — same MSE pipeline but managed by go2rtc
function openMSE(id, wsPath) {
  closeMSE(id);

  const state = { ms: null, sb: null, ws: null, queue: [], flushing: false, frameCount: 0, latTimer: null };
  S[id] = state;

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws    = new WebSocket(`${proto}//${location.host}${wsPath}`);
  ws.binaryType = 'arraybuffer';
  state.ws = ws;

  const vid = document.getElementById(`vid-${id}`);

  function initMSE(codec) {
    const ms = new MediaSource();
    state.ms = ms;
    vid.src  = URL.createObjectURL(ms);
    ms.addEventListener('sourceopen', () => {
      try {
        const sb = ms.addSourceBuffer(codec);
        state.sb = sb;
        sb.mode  = 'segments';
        sb.addEventListener('updateend', () => {
          state.flushing = false;
          trimBuffer(id);
          flushQueue(id);
        });
        console.log(`[WS:${id}] SourceBuffer ready with codec: ${codec}`);
      } catch (e) { toast('MSE init error: ' + e.message, true); }
    });
  }

  ws.onopen = () => {
    console.log(`[WS:${id}] go2rtc connected — sending MSE handshake`);
    // go2rtc protocol: send supported codec, go2rtc responds with confirmed codec then streams fMP4
    const codec = ['video/mp4; codecs="avc1.640029"', 'video/mp4; codecs="avc1.42E028"', 'video/mp4']
      .find(m => MediaSource.isTypeSupported(m)) || 'video/mp4';
    ws.send(JSON.stringify({ type: 'mse', value: codec }));
  };

  ws.onmessage = e => {
    // go2rtc sends a JSON response first confirming the codec, then binary fMP4
    if (typeof e.data === 'string') {
      try {
        const msg = JSON.parse(e.data);
        console.log(`[WS:${id}] go2rtc msg:`, msg);
        if (msg.type === 'mse' && msg.value) {
          // go2rtc confirmed codec — now init MSE with the confirmed codec
          initMSE(msg.value);
        }
      } catch (_) {}
      return;
    }

    // Binary fMP4 data
    state.queue.push(e.data);
    while (state.queue.length > 2) state.queue.shift();
    flushQueue(id);

    state.frameCount++;
    if (state.frameCount === 1) vid.play().catch(() => {});
    if (state.frameCount === 3) {
      spinner(id, false);
      setStatus(id, 'live', '● LIVE');
      toast(`${id} connected`);
    }
  };

  ws.onclose = () => {
    if (!S[id]) return;
    console.log(`[WS:${id}] closed — retrying in 1.5s`);
    setStatus(id, 'loading', 'RECONNECTING...');
    setTimeout(() => { if (S[id]) openMSE(id, wsPath); }, 1500);
  };
  ws.onerror = () => { setStatus(id, 'error', '✕ WS ERR'); toast(`${id}: WebSocket error`, true); };

  startLatTimer(id);
}

function flushQueue(id) {
  const s = S[id];
  if (!s || s.flushing || !s.sb || s.sb.updating || !s.queue.length) return;
  s.flushing = true;
  try { s.sb.appendBuffer(s.queue.shift()); }
  catch (e) { s.flushing = false; if (e.name === 'QuotaExceededError') trimBuffer(id); }
}

function trimBuffer(id) {
  const s   = S[id]; if (!s || !s.sb || s.sb.updating) return;
  const vid = document.getElementById(`vid-${id}`); if (!vid || !s.sb.buffered.length) return;
  const start  = s.sb.buffered.start(0);
  const trimTo = vid.currentTime - 1.0;
  if (trimTo > start + 0.5) {
    try { s.flushing = true; s.sb.remove(start, trimTo); }
    catch (_) { s.flushing = false; }
  }
}

function startLatTimer(id) {
  stopLatTimer(id);
  const vid   = document.getElementById(`vid-${id}`);
  const latEl = document.getElementById(`lat-${id}`);
  S[id].latTimer = setInterval(() => {
    if (!vid?.buffered.length) return;
    const end = vid.buffered.end(vid.buffered.length - 1);
    const ms  = Math.round((end - vid.currentTime) * 1000);
    if (latEl) {
      latEl.textContent = ms + 'ms';
      latEl.className   = 'latency ' + (ms < 1000 ? 'good' : ms < 2500 ? 'warn' : 'bad');
    }
    if (ms > 1500) vid.currentTime = end - 0.2;
    if (vid.paused && S[id]?.frameCount > 5) vid.play().catch(() => {});
  }, 200);
}

function stopLatTimer(id) {
  if (S[id]?.latTimer) { clearInterval(S[id].latTimer); S[id].latTimer = null; }
}

function closeMSE(id) {
  stopLatTimer(id);
  const s = S[id];
  if (s?.ws) { s.ws.close(); s.ws = null; }
  delete S[id];
}

function stopCam(id) {
  closeMSE(id);
  const vid = document.getElementById(`vid-${id}`);
  if (vid) { vid.pause(); vid.src = ''; }
  showPH(id); setStatus(id, 'idle', 'NO SIGNAL');
  const l = document.getElementById(`lat-${id}`);
  if (l) { l.textContent = '--ms'; l.className = 'latency good'; }
  fetch(`/api/stream/${id}/stop`, { method: 'POST' }).catch(() => {});
  toast(`${id} disconnected`);
}

function setLayout(l) {
  currentLayout = l;
  document.getElementById('l-grid').classList.toggle('active', l === 'grid');
  document.getElementById('l-solo').classList.toggle('active', l === 'solo');
  document.getElementById('grid').className = l === 'solo' ? 'grid l1' : `grid l${Math.min(cameras.length, 5)}`;
}
function setQuality(q) {
  currentQuality = q;
  document.getElementById('q-hd').classList.toggle('active', q === 'HD');
  document.getElementById('q-sd').classList.toggle('active', q === 'SD');
  cameras.filter(c => S[c.id]?.ws).forEach(c => { stopCam(c.id); setTimeout(() => connectCam(c.id), 300); });
}
function fullscreen(id) {
  const el = document.getElementById(`card-${id}`);
  if (!document.fullscreenElement) el.requestFullscreen();
  else document.exitFullscreen();
}

function setStatus(id, type, text) {
  const el = document.getElementById(`st-${id}`);
  if (el) { el.className = `tag ${type}`; el.textContent = text; }
}
function spinner(id, on) { document.getElementById(`spin-${id}`)?.classList.toggle('on', on); }
function showPH(id) { const e = document.getElementById(`ph-${id}`); if (e) e.style.display = 'flex'; }
function hidePH(id) { const e = document.getElementById(`ph-${id}`); if (e) e.style.display = 'none'; }
function setFooter(m) { document.getElementById('fmsg').textContent = m; }
function toast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (isErr ? ' err' : '');
  clearTimeout(t._t); t._t = setTimeout(() => t.className = '', 3500);
}

init();
</script>
</body>
</html>
