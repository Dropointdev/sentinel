services:
  - type: web
    name: sentinel
    runtime: node
    region: singapore    # closest to your IMOU server (cmgw-sg)
    plan: starter        # or whatever your paid plan is
    buildCommand: npm install && chmod +x ./mediamtx
    startCommand: node src/server.js
    envVars:
      - key: IMOU_APP_ID
        sync: false      # you'll enter these manually in Render dashboard
      - key: IMOU_APP_SECRET
        sync: false
      - key: IMOU_DEVICE_ID
        sync: false
      - key: PORT
        value: 4000